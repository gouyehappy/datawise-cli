spring:
  application:
    name: datawise-backend
  profiles:
    # mvn spring-boot:run / IDE 默认走 dev；Electron 打包显式 --spring.profiles.active=desktop
    default: dev
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  config: classpath:logback-spring.xml
  level:
    org.apache.datawise.backend: INFO
    datawise.exception: WARN
    # Hive JDBC 连接池 keepalive 会触发 Thrift SASL 读写；默认压到 WARN 避免控制台刷屏
    org.apache.thrift: WARN
    org.apache.hive: WARN

datawise:
  config:
    # 相对 backend 模块 cwd（mvn spring-boot:run）指向仓库根 config/
    dir: config
    secrets:
      # 启动时将 connections.xml / app.xml 中明文密钥批量加密
      migrate-on-startup: true
  storage:
    # file = JSON/XML under config/（默认）；jdbc = 身份元数据进库（用户/会话/租户/Token）
    backend: file
    datasource:
      jdbc-url: jdbc:h2:mem:datawise_metadata;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
      username: sa
      password: ""
      driver-class-name: org.h2.Driver
  tenancy:
    # single = 本地/私有化隐式 default 租户；multi = SaaS 多租户
    mode: multi
    default-tenant-id: default
    allow-tenant-create: false
    # multi 时填写平台超管 userId；留空则回退为首个注册用户
    platform-admin-user-ids: []
    # 每租户连接数硬顶；0 = 不限制
    max-connections-per-tenant: 0
    # 是否开放公开注册（本地账号）
    allow-registration: false
    # 每租户每日 AI 调用上限；0 = 不限制
    max-ai-calls-per-tenant-per-day: 0
  auth:
    session:
      # 登录 token 默认有效 1 小时；可在设置页覆盖 config/auth-session.json
      ttl-minutes: 60
      sliding-renewal: true
  security:
    connection-probe:
      # 默认拒绝探测私网/元数据地址（防 SSRF）。桌面/本地 profile 会覆盖为 true
      allow-private-networks: false
    auth:
      # 受保护路由默认拒绝匿名；公开路径见 public-path-prefixes
      require-authentication: true
      public-path-prefixes:
        - /login
        - /signOut
        - /api/auth/register
        - /api/auth/login-options
        - /api/auth/oidc/login
        - /api/auth/oidc/callback
        - /api/health
        - /actuator/health
        - /actuator/prometheus
        - /v3/api-docs
        - /swagger-ui
  logging:
    # 统一运行日志：config/logs/datawise.log（含异常堆栈）
    dir: config/logs
  jdbc:
    # 启动时预加载 config/drivers/ 下已存在的 JDBC 驱动 JAR
    preload-drivers-on-startup: true
    pool:
      # 每个已保存连接的 HikariCP 池参数（可按部署规模调大 maximum-pool-size）
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout-ms: 60000
      max-lifetime-ms: 600000
      connection-timeout-ms: 10000
      validation-timeout-ms: 3000
      keepalive-time-ms: 30000
      # SELECT 默认 fetch size；0 表示使用驱动默认值
      default-fetch-size: 500
  connectors:
    # 可选数据源 connector 插件目录（相对 datawise.config.dir）
    plugins-dir: plugins
    # AppCDS 训练可设 false，避免把插件 ClassLoader 类打进 jsa 导致运行时刷屏
    load-plugins: true
    # 拒绝 SHA-256 与 config/plugins/manifest.json 不一致的插件 JAR
    require-manifest-integrity: true
  query:
    # 服务端默认最大返回行数；0 表示不限制（仅建议本地显式开启）
    max-result-rows: 10000
  sql:
    rewrite:
      # 控制台执行前自动为表名/字段名加引号（基于 sqlparser + 连接 dbType）
      quote-identifiers: true
  workspace:
    # SQL 脚本根目录默认值（可在设置页修改，持久化到 config/workspace.xml）
    scripts-dir: scripts
  terminal:
    websocket:
      # 默认关闭：启用前须完成安全评审
      enabled: false
      # 非空时仅允许所列 IP / IPv4 CIDR 握手；示例：127.0.0.1、10.0.0.0/8
      allowed-ips: []
      # 非空时仅当直连 remote 命中列表才读取 X-Forwarded-For / X-Real-IP（防伪造）
      trusted-proxy-ips: []
  connection:
    # 长时间无 SQL/Explorer 操作后自动回收 JDBC 连接池（毫秒）；健康探测 ping 不计入活跃
    idle-evict-enabled: true
    idle-evict-ms: 900000
    idle-evict-poll-ms: 60000
  ssh:
    # 交互 Shell 空闲 keepalive（毫秒）；0 关闭。避免 NAT/防火墙过早掐断 SSH。
    server-alive-interval-ms: 15000
    server-alive-count-max: 3
    idle-ttl-minutes: 30
  explorer:
    schema-session:
      # Explorer 懒加载树复用的 JDBC schema 会话空闲回收时间（毫秒）
      idle-timeout-ms: 120000
      max-entries: 16
      schema-cache-ttl-ms: 3600000
      table-list-page-size: 500
  migration:
    default-batch-size: 500
    max-batch-tables: 50
    continue-on-table-failure: true
    table-retry-attempts: 2
    pipeline-read-ahead: true
    task-concurrency-enabled: true
    task-concurrency-tenant-slots: 2
    task-concurrency-default-priority: 5
    task-concurrency-admission-log-enabled: false
    task-concurrency-priority:
      small-table-threshold: 1
      medium-table-threshold: 3
      large-table-threshold: 5
      huge-table-threshold: 10
      small-table-bonus: 1
      medium-table-bonus: 1
      large-table-penalty: 1
      huge-table-penalty: 2
      resume-bonus: 1
      small-batch-threshold: 200
      large-batch-threshold: 2000
      small-batch-bonus: 0
      large-batch-penalty: 1
      throttle-penalty: 1
  task-concurrency:
    enabled: true
    # 单机桌面默认内存；多实例请改 jdbc（需 storage.backend=jdbc）并粘滞 SSE
    store-type: in-memory
    global-max-concurrent: 6
    lease-ttl: 30m
    dispatch-interval: 500ms
    maintenance-interval: 30s
    dispatch-batch-size: 10
    runtime-enabled: true
    metrics:
      enabled: true
      prefix: datawise.task.concurrency
  ai:
    rag:
      enabled: true
      # 向量库：none | memory | pgvector — 生产推荐 pgvector + openai embedding（见 docs/AI_PRODUCTION.md）
      vector-store: none
      pgvector:
        jdbc-url:
        username:
        password:
        table: ai_evidence_embeddings
      max-snippets: 12
      max-glossary-hits: 6
      embedding:
        # hash — 离线确定性向量（开发）；生产用 openai 兼容 embedding API
        provider: hash
        base-url:
        api-key:
        model: text-embedding-3-small
        # dimensions: 1536
    analysis:
      checkpoint:
        # memory | file — file 持久化 SQL 确认 interrupt 会话（config/ai-checkpoints/）
        storage: file
      # off | lenient | strict — 生产推荐 strict
      semantic-check: strict
      retry:
        max-sql-validation-retries: 2
        max-sql-execute-attempts: 2
      steps:
        planner: true
        evidence: true
        sql-validate: true
        python: true
        chart: true
        summary: true
        report: true
    python:
      enabled: true
      # simulated 仅开发；生产推荐 docker（见 docs/AI_PRODUCTION.md）
      executor: simulated
      sandbox-enabled: true
      python-command: python
      pip-command: pip
      dependency-install-enabled: true
      allowed-packages: pandas,numpy,scipy,scikit-learn,matplotlib,statsmodels,seaborn
      dependency-install-timeout-seconds: 60
      docker-binary: docker
      docker-image: python:3.12-slim
      docker-memory: 512m
      k8s-binary: kubectl
      k8s-namespace: default
      k8s-image: python:3.12-slim
      k8s-memory: 512Mi
      timeout-seconds: 30
      max-retries: 2
