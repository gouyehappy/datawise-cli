# 桌面一体化打包（Electron 内嵌 JRE）专用：优先缩短冷启动时间
# 端口与 datawise-frontend/runtime-ports.json → desktop.backend 一致，便于同机与 dev 并行
server:
  port: 18423
  # 仅本机回环，避免 Windows 首次启动弹出 Java 防火墙放行框
  address: 127.0.0.1

spring:
  main:
    banner-mode: off
    lazy-initialization: true
  jmx:
    enabled: false

management:
  endpoints:
    enabled-by-default: false
  endpoint:
    health:
      enabled: true

logging:
  level:
    root: WARN
    org.apache.datawise.backend: INFO
    org.springframework: WARN
    org.apache.thrift: WARN
    org.apache.hive: WARN

# 桌面包不需要 OpenAPI UI，避免启动期扫描 Controllers
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

datawise:
  security:
    connection-probe:
      # 桌面客户端连接内网库是主场景
      allow-private-networks: true
  connectors:
    require-manifest-integrity: false
  jdbc:
    # 驱动在首次连接时再加载，避免启动扫描 config/drivers/
    preload-drivers-on-startup: false
  ai:
    analysis:
      semantic-check: lenient
  migration:
    task-concurrency-priority:
      small-table-threshold: 1
      medium-table-threshold: 3
      large-table-threshold: 5
      huge-table-threshold: 10
      small-table-bonus: 1
      medium-table-bonus: 1
      large-table-penalty: 1
      huge-table-penalty: 2
      resume-bonus: 1
      small-batch-threshold: 200
      large-batch-threshold: 2000
      small-batch-bonus: 0
      large-batch-penalty: 1
      throttle-penalty: 1
