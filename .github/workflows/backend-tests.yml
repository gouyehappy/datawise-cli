name: Backend tests

on:
  push:
    paths:
      - 'datawise-backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'datawise-backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: datawise-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run unit tests
        run: mvn -B test -DskipITs
