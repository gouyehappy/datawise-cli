name: Desktop release

# Tag a release (example):
#   git tag v4.0.1
#   git push origin v4.0.1
#
# Default host is JCEF on all platforms (zip via dist:desktop).
# Legacy Electron: npm run dist:electron* (not used by this workflow).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish artifacts to GitHub Releases'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: datawise-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: datawise-frontend/package-lock.json

      - name: Align package version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version
          node -e "
            const fs=require('fs');
            const p='../datawise-desktop/pom.xml';
            let x=fs.readFileSync(p,'utf8');
            x=x.replace(/<version>[^<]+<\\/version>/,'<version>${TAG}</version>');
            fs.writeFileSync(p,x);
          "

      - name: Install frontend deps
        run: npm ci

      - name: Install WiX Toolset (for Setup.exe)
        shell: bash
        run: choco install wixtoolset -y --no-progress

      - name: Build and publish Windows desktop (JCEF)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # WiX candle/light on PATH for jpackage --type exe
          export PATH="/c/Program Files (x86)/WiX Toolset v3.14/bin:/c/Program Files (x86)/WiX Toolset v3.11/bin:$PATH"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then
            npm run dist:desktop -- --dir
          else
            npm run dist:desktop:publish
          fi

  release-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: datawise-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: datawise-frontend/package-lock.json

      - name: Align package version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version
          node -e "
            const fs=require('fs');
            const p='../datawise-desktop/pom.xml';
            let x=fs.readFileSync(p,'utf8');
            x=x.replace(/<version>[^<]+<\\/version>/,'<version>${TAG}</version>');
            fs.writeFileSync(p,x);
          "

      - name: Install frontend deps
        run: npm ci

      - name: Build and publish Linux desktop (JCEF)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then
            npm run dist:desktop -- --dir
          else
            npm run dist:desktop:publish
          fi

  release-macos:
    runs-on: macos-14
    defaults:
      run:
        working-directory: datawise-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: datawise-frontend/package-lock.json

      - name: Align package version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version
          node -e "
            const fs=require('fs');
            const p='../datawise-desktop/pom.xml';
            let x=fs.readFileSync(p,'utf8');
            x=x.replace(/<version>[^<]+<\\/version>/,'<version>${TAG}</version>');
            fs.writeFileSync(p,x);
          "

      - name: Install frontend deps
        run: npm ci

      - name: Build and publish macOS desktop (JCEF)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then
            npm run dist:desktop -- --dir
          else
            npm run dist:desktop:publish
          fi
