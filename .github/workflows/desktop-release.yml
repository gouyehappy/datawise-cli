name: Desktop release

# Tag a release (example):
#   git tag v1.3.0
#   git push origin v1.3.0
#
# Creates a GitHub Release with electron-builder artifacts so packaged
# apps can auto-update via electron-updater.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish artifacts to GitHub Releases'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: datawise-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: datawise-frontend/package-lock.json

      - name: Align package version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Install frontend deps
        run: npm ci

      - name: Build and publish Windows desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        shell: bash
        run: |
          npm run gen:icons
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then
            npm run dist:desktop -- --win
          else
            node scripts/desktop/bundle-backend.mjs
            npm run build:electron
            npx electron-builder --win --publish always
          fi

  release-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: datawise-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: datawise-frontend/package-lock.json

      - name: Align package version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Install frontend deps
        run: npm ci

      - name: Build and publish Linux desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        shell: bash
        run: |
          npm run gen:icons
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then
            npm run dist:desktop -- --linux
          else
            node scripts/desktop/bundle-backend.mjs
            npm run build:electron
            npx electron-builder --linux --publish always
          fi
