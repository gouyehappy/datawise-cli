name: Playwright real-backend E2E

# Optional / nightly — not part of the default PR gate (see frontend-tests.yml mock E2E).
on:
  workflow_dispatch:
  schedule:
    # 04:20 UTC daily
    - cron: '20 4 * * *'

concurrency:
  group: e2e-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: datawise-frontend/package-lock.json

      - name: Compile backend
        working-directory: datawise-backend
        run: mvn -B -pl datawise-server -am package -DskipTests

      - name: Install frontend deps
        working-directory: datawise-frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: datawise-frontend
        run: npx playwright install chromium --with-deps

      - name: Run real-backend smoke E2E
        working-directory: datawise-frontend
        run: npm run test:e2e:backend
        env:
          CI: true

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-backend-e2e
          path: |
            datawise-frontend/test-results/
            datawise-frontend/playwright-report/
          if-no-files-found: ignore
